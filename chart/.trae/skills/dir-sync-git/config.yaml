# Directory Sync Git Configuration
# Version: 1.1
# Description: Configuration for automated directory synchronization and Git commit workflow
# Last Updated: 2026-03-19

# ============================================
# Source Directory Settings
# ============================================
source:
  path: ""
  description: "Development source directory"

# ============================================
# Target Directory Settings
# ============================================
target:
  path: ""
  description: "Target git repository"
  remote: "origin"
  main_branch: "main"

# ============================================
# Comparison Settings
# ============================================
comparison:
  method: "builtin"
  beyond_compare_path: ""
  use_modification_time: true
  use_content_comparison: false
  time_tolerance_seconds: 1

# ============================================
# Exclusion Patterns
# ============================================
exclusions:
  directories:
    - ".git"
    - ".svn"
    - ".hg"
    - "__pycache__"
    - "node_modules"
    - ".vs"
    - ".vscode"
    - ".idea"
    - "build"
    - "dist"
    - "target"
    - "bin"
    - "obj"
    - "*.tmp"
    - ".trae"
  files:
    - "*.log"
    - "*.bak"
    - "*.swp"
    - "*.swo"
    - "*~"
    - ".DS_Store"
    - "Thumbs.db"
    - "*.pyc"
    - "*.pyo"
    - "*.class"
    - "*.exe"
    - "*.dll"
    - "*.so"
    - "*.dylib"
    - "*.pdb"
    - "*.ilk"
    - "*.idb"
    - "*.obj"
    - "*.o"
    - "*.a"
    - "*.lib"

# ============================================
# Manual Confirmation Items
# ============================================
manual_items:
  enabled: true
  items:
    - path: "config/production.yaml"
      reason: "Production configuration - requires review before updating"
      auto_approve_if_newer_hours: null
    - path: "scripts/deploy.sh"
      reason: "Deployment script - verify before updating"
    - path: "version.txt"
      reason: "Version file - manual version bump may be required"
    - path: "migrations/*.sql"
      reason: "Database migration - review SQL before applying"
    - path: ".env*"
      reason: "Environment configuration - contains sensitive data"

# ============================================
# Conflict Resolution Settings
# ============================================
conflict_resolution:
  default_strategy: "manual"
  
  patterns:
    - pattern: "*.py"
      strategy: "source_wins"
    - pattern: "config/*"
      strategy: "manual"
    - pattern: "*.md"
      strategy: "newer_wins"
    - pattern: "*.yaml"
      strategy: "manual"
    - pattern: "*.json"
      strategy: "newer_wins"
  
  on_conflict:
    stop_on_conflict: false
    log_conflicts: true
    conflict_log_file: ".sync-conflicts.log"

# ============================================
# Git Settings
# ============================================
git:
  branch_prefix: "brch_"
  auto_branch_name: true
  default_branch_name: "sync-update"
  
  branch_name_patterns:
    python_files: "py_update"
    config_files: "config_sync"
    doc_files: "doc_update"
    web_files: "web_update"
    default: "sync"
  
  commit_message_template: |
    sync: Automated directory sync on {date}
    
    Source: {source}
    Target: {target}
    
    Files updated ({file_count}):
    {files}
    
    Summary: {summary}
  
  push_to_main: true
  merge_strategy: "merge"
  delete_branch_after_merge: true
  
  create_pr: false
  pr_title_template: "Sync: {summary} ({date})"
  pr_description_template: |
    ## Automated Directory Synchronization
    
    This PR contains automated directory synchronization changes.
    
    ### Changes Summary
    {summary}
    
    ### Files Changed ({file_count})
    {files}
    
    ---
    *Auto-generated by dir-sync-git skill*

# ============================================
# Backup Settings
# ============================================
backup:
  enabled: true
  directory: ".sync-backup"
  max_backups: 5
  naming_pattern: "{filename}.{timestamp}.bak"

# ============================================
# Transactional Mode Settings
# ============================================
advanced:
  dry_run: false
  max_files_per_sync: 1000
  auto_confirm_threshold: 50
  parallel_comparison: true
  parallel_workers: 4
  retry_count: 3
  retry_delay_seconds: 1
  
  transactional_mode: true
  transaction_log: ".sync-transaction.log"

# ============================================
# Progress Feedback Settings
# ============================================
progress:
  enabled: true
  update_interval_ms: 500
  format: "detailed"
  
  callback:
    enabled: false
    url: ""
    method: "POST"

# ============================================
# Logging Settings
# ============================================
logging:
  enabled: true
  log_file: "sync.log"
  log_level: "INFO"
  log_format: "%(asctime)s - %(levelname)s - %(message)s"
  include_file_list: true
  max_file_size_mb: 10
  backup_count: 5

# ============================================
# Notification Settings
# ============================================
notifications:
  enabled: false
  
  events:
    on_sync_start: false
    on_sync_complete: true
    on_sync_error: true
    on_manual_item: true
    on_commit: true
    on_push: true
  
  webhook:
    enabled: false
    url: ""
    type: "generic"
    payload_template: |
      {
        "text": "Sync completed: {summary}",
        "files": "{files}"
      }
  
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    use_tls: true
    from_address: ""
    recipients: []
    subject_template: "Sync Complete: {summary}"

# ============================================
# Pre/Post Hooks
# ============================================
hooks:
  pre_sync:
    enabled: false
    commands:
      - command: "npm test"
        working_dir: "{source}"
        continue_on_failure: false
      - command: "git status --porcelain"
        working_dir: "{target}"
        expect_empty_output: true
  
  post_sync:
    enabled: false
    commands:
      - command: "npm run build"
        working_dir: "{target}"
        continue_on_failure: true
  
  post_commit:
    enabled: false
    commands:
      - command: "./deploy.sh"
        working_dir: "{target}"
        continue_on_failure: true

# ============================================
# Configuration Validation
# ============================================
# Required fields: source.path, target.path
# Optional fields: all other fields have defaults
# 
# Validation rules:
# - source.path: must be absolute path, must exist
# - target.path: must be absolute path, must exist, must be git repo
# - comparison.method: must be "builtin" or "beyond_compare"
# - conflict_resolution.default_strategy: must be one of:
#   "source_wins", "target_wins", "newer_wins", "manual", "skip"
# - git.branch_prefix: must not be empty (default: "brch_")
