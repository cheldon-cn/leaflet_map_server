; ============================================
; Trae 自动继续工具配置文件
; 版本: 1.1
; ============================================

[General]
; 检测间隔 (毫秒) - 10秒
DetectInterval=20000

; 冷却时间 (毫秒)
CooldownTime=900

; 执行后等待时间 (毫秒)
PostExecutionWait=10000

; 是否启用自动继续
EnableAutoContinue=1

; 是否启用调试模式
DebugMode=1

; 响应前随机延迟最小值 (毫秒) - 10秒
ResponseDelayMin=10000

; 响应前随机延迟最大值 (毫秒) - 30秒
ResponseDelayMax=30000

[Window]
; Trae IDE 窗口标题匹配字符串
; 使用 Window Spy 工具获取: 右键托盘图标 -> Window Spy -> 鼠标移到窗口上查看
WindowTitle=Trae CN

; 窗口标题匹配模式
; 1 = 开头匹配 (标题必须以指定字符串开头)
; 2 = 包含匹配 (标题包含指定字符串即可)
; 3 = 精确匹配 (标题必须完全匹配)
TitleMatchMode=2

; 窗口检测超时 (毫秒)
WindowDetectTimeout=5000

[InputPosition]
; 输入框位置配置 (相对于窗口客户区)
; 使用 Window Spy 工具获取坐标，然后减去窗口客户区左上角坐标

; 输入框 X 坐标偏移 (相对于窗口宽度比例，0.0-1.0)
; 例如: 0.5 表示窗口宽度的一半位置
InputOffsetX=0.7805

; 输入框 Y 坐标偏移 (相对于窗口高度比例，0.0-1.0)
; 例如: 0.9 表示窗口高度的90%位置(底部附近)
InputOffsetY=0.8503

; 输入框绝对坐标 (启用后忽略比例配置)
; 格式: x,y (相对于窗口客户区左上角)
; 设为 -1,-1 表示使用比例配置
InputAbsolutePos=-1,-1

[ButtonPosition]
; 发送按钮位置配置 (相对于窗口客户区)

; 发送按钮 X 坐标偏移 (相对于窗口宽度比例，0.0-1.0)
; 例如: 0.95 表示窗口宽度的95%位置(右侧)
ButtonOffsetX=0.9755

; 发送按钮 Y 坐标偏移 (相对于窗口高度比例，0.0-1.0)
; 例如: 0.95 表示窗口高度的95%位置(底部附近)
ButtonOffsetY=0.9332

; 发送按钮绝对坐标 (启用后忽略比例配置)
; 格式: x,y (相对于窗口客户区左上角)
; 设为 -1,-1 表示使用比例配置
ButtonAbsolutePos=-1,-1

[DetectionRegion]
; 九宫格检测区域配置
; 区域编号: 1-9 (九宫格), 0 (全窗口)
; 
; +-------+-------+-------+
; |   1   |   2   |   3   |
; +-------+-------+-------+
; |   4   |   5   |   6   |
; +-------+-------+-------+
; |   7   |   8   |   9   |
; +-------+-------+-------+
;
; 优先检测区域 (逗号分隔，按顺序检测)
; 例如: 1,2,3 表示先检测顶部三格
; 只检测此处指定的区域，不会额外检测其他区域
PriorityRegions=9

; 如果优先区域未检测到，是否检测全窗口
; 0 = 只检测 PriorityRegions 指定的区域，不检测其他区域
; 1 = 优先区域未找到时，再检测全窗口
DetectFullWindowIfNotFound=0

; 自定义检测区域 (相对于窗口客户区)
; 格式: x,y,width,height
; 设为空表示不使用自定义区域
CustomRegion=

[OCR]
; OCR 引擎类型: RapidOCR
OCREngine=RapidOCR

; OCR 识别超时 (毫秒)
OCRTimeout=3000

; OCR 置信度阈值 (0-100)
ConfidenceThreshold=80

; 是否启用 OCR 缓存
EnableOCRCache=1

; OCR 缓存有效期 (毫秒)
OCRCacheExpiry=60000

[Keywords]
; 检测关键词 (逗号分隔)
PromptKeywords=模型思考次数已达上限,思考次数已达上限,已达上限

; 输入文本
InputText=继续

[Retry]
; 最大重试次数
MaxRetryCount=3

; 重试间隔基数 (毫秒)
RetryBaseDelay=1000

; 重试间隔最大值 (毫秒)
RetryMaxDelay=30000

; 连续失败阈值 - 达到后自动重启
ConsecutiveFailureThreshold=5

[Log]
; 日志级别: DEBUG, INFO, WARN, ERROR
LogLevel=INFO

; 日志文件路径
LogFilePath=log\trae_auto.log

; 日志文件最大大小 (KB)
LogMaxSize=1024

; 日志保留天数
LogRetentionDays=7

[Watchdog]
; 看门狗文件路径
WatchdogFilePath=log\watchdog.txt

; 看门狗超时 (毫秒) - 5分钟
WatchdogTimeout=300000

[Heartbeat]
; 心跳间隔 (毫秒) - 30秒
HeartbeatInterval=30000

; 心跳超时 (毫秒) - 2分钟
HeartbeatTimeout=120000

[PixelDetection]
; 是否启用像素检测作为备选方案
EnablePixelDetection=0

; 目标区域坐标 (相对于窗口客户区)
; 格式: x,y,width,height
TargetRegion=0,0,100,100

; 目标颜色 (十六进制 RGB)
TargetColor=0xFFFFFF

; 颜色容差 (0-255)
ColorTolerance=10
