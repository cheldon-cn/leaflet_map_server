; ============================================================
; Trae Auto Continue 配置文件
; ============================================================
; 说明：本配置文件用于控制自动续写功能的行为
; 修改后需重启程序才能生效
; ============================================================

[General]
; 冷却周期（毫秒）- 执行完成后等待多久再开始检测
; 默认：900000（15分钟）
CooldownPeriod=900000

; 检查间隔（毫秒）- 每次检测的时间间隔
; 默认：10000（10秒）
CheckInterval=30000

; 执行后延迟（毫秒）- 执行操作后的等待时间
; 默认：30000（30秒）
PostExecutionDelay=30000

; 是否启用日志
; 可选：true / false
EnableLog=true

; 日志文件路径（相对于程序目录）
LogFile=log\trae_auto.log

; 日志文件最大大小（字节）
; 默认：10485760（10MB）
MaxLogSize=10485760

[Detection]
; 目标窗口 - 要监控的窗口标识
; 格式：ahk_exe 进程名.exe
TargetWindow=ahk_exe Trae CN.exe

; 关键词列表 - 检测到这些关键词时触发执行
; 多个关键词用英文逗号分隔
Keywords=模型思考次数已达上限,请输入继续,获得更多结果,次数已达上限,手动终止输出

; OCR区域数量 - 将屏幕分割成多少个区域进行检测
; 默认：9（3x3网格）
OCRRegion=9

; 是否启用OCR检测
; 可选：true / false
UseOCR=true

[OCR]
; OCR引擎类型
; 可选：RapidOCR
Engine=RapidOCR

; RapidOCR库路径（相对于程序目录）
RapidOCRPath=lib\RapidOCR\RapidOCR.ahk

; OCR置信度阈值 - 识别结果低于此值将被忽略
; 范围：0.0 - 1.0
; 默认：0.9
ConfidenceThreshold=0.9

[Execution]
; 输入延迟（毫秒）- 点击输入框后等待多久开始输入
InputDelay=100

; 点击延迟（毫秒）- 输入完成后等待多久点击发送按钮
ClickDelay=200

; 最大重试次数 - 执行失败时的最大重试次数
MaxRetries=3

; 重试延迟（毫秒）- 重试之间的等待时间
RetryDelay=1000

; 是否验证执行结果
; 可选：true / false
VerifyResult=true

; 连续失败阈值 - 连续失败多少次后停止执行
ConsecutiveFailuresThreshold=5

; 是否启用随机延迟
; 可选：true / false
; 启用后检测到关键词会等待随机时间再执行
EnableRandomDelay=true

; 随机延迟最小值（秒）
RandomDelayMin=10

; 随机延迟最大值（秒）
RandomDelayMax=30

; 发送的文本内容
; 检测到关键词后自动发送的文字
SendText=继续

[UI]
; 是否显示托盘图标
; 可选：true / false
ShowTrayIcon=true

; 是否显示通知提示
; 可选：true / false
ShowNotifications=true

[Position]
; 输入框位置 - 相对于窗口客户区的比例坐标
; 范围：0.0 - 1.0
; 使用 ClickCoordinateHelper.ahk 工具获取
InputX=0.7805
InputY=0.8503

; 发送按钮位置 - 相对于窗口客户区的比例坐标
; 范围：0.0 - 1.0
; 使用 ClickCoordinateHelper.ahk 工具获取
SendBtnX=0.9755
SendBtnY=0.9332
